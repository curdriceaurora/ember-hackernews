name: Ember
options:
  bundleIdPrefix: com.datanoise
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Ember:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.datanoise.ember
        PRODUCT_NAME: Ember
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SWIFT_VERSION: "5.0"
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"

  EmberTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/EmberTests
    dependencies:
      - target: Ember
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.datanoise.ember.tests
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"

  EmberLiveAPITests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/EmberLiveAPITests
    dependencies:
      - target: Ember
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.datanoise.ember.live-api-tests
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"

  EmberUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/EmberUITests
    dependencies:
      - target: Ember
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.datanoise.ember.ui-tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: G2S3H982C7
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"

schemes:
  Ember:
    build:
      targets:
        Ember: all
    test:
      config: Debug
      testPlans:
        - path: TestPlans/Core.xctestplan
          defaultPlan: true
        - path: TestPlans/LiveAPI.xctestplan
